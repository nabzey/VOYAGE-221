name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de l'image Docker Hub à déployer"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement via SSH sur EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/VOYAGE-221
            git pull origin main
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose pull
            docker compose up -d
            docker image prune -f