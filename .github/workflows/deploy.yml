name: Deploy to EC2 with Ansible

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de l'image Docker Hub à déployer"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install ansible -y

      - name: Deploy with Ansible
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          cd ansible
          ansible-playbook -i inventory playbook.yml --private-key ~/.ssh/key.pem
